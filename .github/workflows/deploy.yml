name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  deploy-blazor:
    name: Deploy Blazor → Cloudflare Pages
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Blazor WASM workload
      run: dotnet workload install wasm-tools

    - name: Restore
      run: dotnet restore MissionLog.sln

    - name: Inject production API URL
      run: |
        sed -i 's|#{API_BASE_URL}#|${{ secrets.API_BASE_URL }}|g' \
          src/MissionLog.BlazorApp/wwwroot/appsettings.Production.json

    - name: Publish Blazor
      run: dotnet publish src/MissionLog.BlazorApp/MissionLog.BlazorApp.csproj \
        -c Release --no-restore -o ./publish/blazor

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy ./publish/blazor/wwwroot --project-name=missionlog --commit-dirty=true

  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # Railway auto-deploys from GitHub — this job just signals success
    # Railway watches main branch and triggers its own build via Dockerfile
    steps:
    - name: Railway deploys automatically
      run: |
        echo "Railway is configured to watch this repo."
        echo "It will auto-build via Dockerfile on every push to main."
        echo "No manual step needed here."
        echo ""
        echo "API URL: ${{ secrets.API_BASE_URL }}"

    - name: Summary
      run: |
        echo "## 🚀 Deploy triggered" >> $GITHUB_STEP_SUMMARY
        echo "| Service | Platform | URL |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|----------|-----|" >> $GITHUB_STEP_SUMMARY
        echo "| API | Railway | ${{ secrets.API_BASE_URL }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Blazor | Cloudflare Pages | *(see CF dashboard)* |" >> $GITHUB_STEP_SUMMARY
        echo "| Swagger | Railway | ${{ secrets.API_BASE_URL }}/swagger |" >> $GITHUB_STEP_SUMMARY
